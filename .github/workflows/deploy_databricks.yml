name: Deploy and Run Azure Databricks Initialization

on:
  push:
    branches:
      - main
#    paths:
#      - 'src/databricks/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Setup Databricks CLI
      uses: databricks/setup-cli@main

# Tells Databricks to automatically clone or update the live Git folder natively
    - name: Sync Git Folder in Databricks Workspace
      env:
        DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      run: |
        # 1. Fetch a live access token from the active Azure Login session
        ARM_TOKEN=$(az account get-access-token --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d --query accessToken --output tsv)
        
        export DATABRICKS_AUTH_TYPE="pat"
        export DATABRICKS_TOKEN=$ARM_TOKEN
        
        REPO_PATH="/Workspace/Shared/ai-governance-control-tower"
        
        # 2. Check if the Git Folder already exists in the Workspace
        if databricks repos get $REPO_PATH > /dev/null 2>&1; then
          echo "🔄 Git folder found! Pulling latest main branch changes..."
          databricks repos update $REPO_PATH --branch main
        else
          echo "🚀 First time deployment! Natively cloning repository into Shared space..."
          # Pass the URL and Provider first, then pass the target directory path using --path
          databricks repos create https://github.com/vrrgithub1/ai-governance-control-tower.git github --path $REPO_PATH
        fi

    # Step 2: Trigger the execution on a one-time single-node cluster
    - name: Trigger Catalog Initialization Job
      env:
        DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      run: |
        # 1. Fetch our live bearer token again
        ARM_TOKEN=$(az account get-access-token --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d --query accessToken --output tsv)
        export DATABRICKS_AUTH_TYPE="pat"
        export DATABRICKS_TOKEN=$ARM_TOKEN

        # 2. Submit a completely self-contained, ad-hoc task payload
        databricks jobs submit --json '{
          "run_name": "AIGCT-Catalog-Mesh-Initialization",
          "tasks": [
            {
              "task_key": "bootstrap_catalogs",
              "spark_python_task": {
                "python_file": "/Workspace/Shared/ai-governance-control-tower/src/databricks/pipeline_orchestration/init_catalog.py"
              },
              "spark_version": "14.3.x-scala2.12",
              "node_type_id": "Standard_D4ds_v5",
              "num_workers": 0
            }
          ]
        }'        