name: Deploy and Run Azure Databricks Initialization

on:
  push:
    branches:
      - main
#    paths:
#      - 'src/databricks/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Setup Databricks CLI
      uses: databricks/setup-cli@main

# Tells Databricks to pull the latest main branch commit natively using active Azure tokens
    - name: Sync Git Folder in Databricks Workspace
      env:
        DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      run: |
        # 1. Fetch a live access token from the active Azure Login session
        ARM_TOKEN=$(az account get-access-token --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d --query accessToken --output tsv)
        
        # 2. Feed the token into the Databricks environment variables explicitly
        export DATABRICKS_AUTH_TYPE="azure-msi"
        export DATABRICKS_TOKEN=$ARM_TOKEN
        
        # 3. Execute the git pull command securely
        databricks repos update /Workspace/Shared/ai-governance-control-tower --branch main

    # Step 2: Trigger the execution on a one-time single-node cluster
    - name: Run Catalog Initialization Script
      env:
        DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      run: |
        databricks jobs run-now --json '{
          "run_name": "AIGCT Catalog Initialization Run",
          "tasks": [
            {
              "task_key": "init_catalog_task",
              "spark_python_task": {
                "python_file": "/Workspace/Shared/aigct/src/databricks/pipeline_orchestration/init_catalog.py"
              },
              "new_cluster": {
                "spark_version": "15.4.x-scala2.12",
                "node_type_id": "Standard_D4ds_v5",
                "num_workers": 0,
                "spark_conf": {
                  "spark.databricks.cluster.profile": "singleNode",
                  "spark.master": "local[*]"
                },
                "custom_tags": {
                  "ResourceClass": "SingleNode"
                }
              }
            }
          ]
        }'
        