name: Deploy Data Mesh Infrastructure & Pipelines

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Log in to Azure Subscription
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 🆕 ADD THIS STEP HERE TO FIX THE 'COMMAND NOT FOUND' ERROR
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main
        with:
          version: "1.7.0"

      # STEP 1: Sync Workspace Repository Files (Our Working Baseline)
      - name: Sync Git Folder in Databricks Workspace
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
        run: |
          ARM_TOKEN=$(az account get-access-token --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d --query accessToken --output tsv)
          export DATABRICKS_AUTH_TYPE="pat"
          export DATABRICKS_TOKEN=$ARM_TOKEN
          
          REPO_PATH="/Workspace/Shared/ai-governance-control-tower"
          
          if databricks repos get $REPO_PATH > /dev/null 2>&1; then
            echo "🔄 Git folder found! Pulling latest main branch changes..."
            databricks repos update $REPO_PATH --branch main
          else
            echo "🚀 First time deployment! Natively cloning repository..."
            databricks repos create https://github.com/your-username/ai-governance-control-tower.git github --path $REPO_PATH
          fi

      # STEP 2: Generate and Drop New Mock Banking Transactions into ADLS Gen2 Storage
      - name: Land Raw Files in Azure Data Lake
        run: |
          echo "📦 Installing Azure Data Lake dependencies on runner..."
          pip install azure-storage-file-datalake azure-identity
          
          echo "📡 Executing local python transaction generator..."
          python $GITHUB_WORKSPACE/src/databricks/pipeline_orchestration/raw_generator.py

      # STEP 3: Execute the Serverless Spark Task to Ingest Data Into the Bronze Schema
      - name: Stream Raw Data to Bronze Delta Table
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
        run: |
          ARM_TOKEN=$(az account get-access-token --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d --query accessToken --output tsv)
          export DATABRICKS_AUTH_TYPE="pat"
          export DATABRICKS_TOKEN=$ARM_TOKEN

          echo "🚀 Submitting serverless Auto Loader ingestion task to Databricks..."
          databricks jobs submit --json '{
            "run_name": "AIGCT-Bronze-Ingestion",
            "tasks": [
              {
                "task_key": "ingest_raw_to_bronze",
                "spark_python_task": {
                  "python_file": "/Workspace/Shared/ai-governance-control-tower/src/databricks/pipeline_orchestration/ingest_to_bronze.py"
                },
                "environment_key": "Default-Serverless-Runtime"
              }
            ],
            "environments": [
              {
                "environment_key": "Default-Serverless-Runtime",
                "spec": {
                  "client": "1.0.0",
                  "dependencies": {
                    "pypi": []
                  }
                }
              }
            ]
          }'
